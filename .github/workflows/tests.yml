name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  pytest:
    name: pytest (${{ matrix.os }} / py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install
        run: |
          python -m pip install -U pip wheel
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio
        shell: bash

      # On Windows, install the optional sounddevice dep that the
      # voice-fallback test path uses. PortAudio binaries ship via pip
      # wheels for Windows.
      - name: Install Windows-only test deps
        if: matrix.os == 'windows-latest'
        run: python -m pip install sounddevice
        shell: bash

      - name: Run tests
        env:
          PHANTOM_ALLOW_PASSTHROUGH: "1"  # let the passthrough sandbox probe true on POSIX CI
        run: |
          python -m pytest -q --tb=short \
              --ignore=phantom/tests/test_binary_smoke.py \
              -k "not real and not stage_8"
        shell: bash
