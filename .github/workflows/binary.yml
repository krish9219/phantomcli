name: binary

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: build + smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install -U pip wheel
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==6.19.0

      - name: Build phantom binary
        run: pyinstaller --clean --noconfirm phantomcli.spec

      - name: Smoke-test binary
        run: |
          ./dist/phantom version
          ./dist/phantom --help
          ./dist/phantom doctor --json || true
          ./dist/phantom bench --turns 10 --json

      - name: Run binary smoke pytest
        run: |
          python -m pip install pytest
          python -m pytest phantom/tests/test_binary_smoke.py -v

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phantom-${{ matrix.os }}
          path: dist/phantom
          if-no-files-found: error
          retention-days: 14
