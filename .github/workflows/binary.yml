name: binary

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: build + smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install build deps
        run: |
          python -m pip install -U pip wheel
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller==6.19.0
        shell: bash

      - name: Build phantom binary
        run: pyinstaller --clean --noconfirm phantomcli.spec
        shell: bash

      - name: Smoke-test binary (POSIX)
        if: matrix.os != 'windows-latest'
        run: |
          ./dist/phantom version
          ./dist/phantom --help
          ./dist/phantom doctor --json || true
          ./dist/phantom bench --turns 10 --json
        shell: bash

      - name: Smoke-test binary (Windows)
        if: matrix.os == 'windows-latest'
        env:
          PHANTOM_ALLOW_PASSTHROUGH: "1"
        run: |
          ./dist/phantom.exe version
          ./dist/phantom.exe --help
          ./dist/phantom.exe doctor --json || ($null = $LASTEXITCODE)
          ./dist/phantom.exe bench --turns 10 --json
        shell: pwsh

      - name: Run smoke pytest
        run: |
          python -m pip install pytest
          python -m pytest phantom/tests/test_binary_smoke.py -v
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: phantom-${{ matrix.os }}
          path: |
            dist/phantom
            dist/phantom.exe
          if-no-files-found: warn
          retention-days: 14
